name: Performance Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: Install Build & Perf Tools
      run: |
        sudo apt-get update
        # Install generic azure tools instead of specific version
        sudo apt-get install -y build-essential cmake libprimesieve-dev linux-tools-azure linux-cloud-tools-azure
        
    - name: Configure CMake
      # -B build creates a build directory, -DCMAKE_BUILD_TYPE=Release ensures optimisations
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      # --build build runs the actual compilation inside the build directory
      run: cmake --build build

    - name: Run Performance Test
      run: |
        sudo sysctl kernel.perf_event_paranoid=-1 || true
        
        # Manually find the perf binary if the wrapper fails
        PERF_BIN=$(find /usr/lib/linux-tools -name perf -executable | head -n 1)
        
        if [ -z "$PERF_BIN" ]; then
          echo "Perf not found, running without stat"
          ./build/mpmp19 10000 1000
        else
          sudo $PERF_BIN stat ./build/mpmp19 10000 1000
        fi
